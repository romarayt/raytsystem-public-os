name: Documentation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: Documentation — reference, coverage, links, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install locked Python dependencies
        run: uv sync --dev --locked
      - name: Install documentation dependencies
        run: npm --prefix website ci
      - name: Generated reference freshness
        run: npm --prefix website run check:reference
      - name: Frontmatter and Markdown links
        run: npm --prefix website run check:frontmatter
      - name: Documentation coverage
        run: npm --prefix website run check:coverage
      - name: Documentation impact
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: uv run python scripts/docs/docs_impact_check.py
      - name: Typecheck
        run: npm --prefix website run typecheck
      - name: Build Docusaurus and validate images
        env:
          DOCS_ORG: ${{ github.repository_owner }}
          DOCS_REPO: ${{ github.event.repository.name }}
        run: npm --prefix website run build
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website/build

  deploy:
    name: Documentation — deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
