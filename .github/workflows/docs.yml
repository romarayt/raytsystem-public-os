name: Documentation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: Documentation — reference, coverage, links, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install locked Python dependencies
        run: uv sync --dev --locked
      - name: Install documentation dependencies
        run: npm --prefix website ci
      - name: Generated reference freshness
        run: npm --prefix website run check:reference
      - name: Frontmatter and Markdown links
        run: npm --prefix website run check:frontmatter
      - name: Documentation coverage
        run: npm --prefix website run check:coverage
      - name: Documentation impact
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: uv run python scripts/docs/docs_impact_check.py
      - name: Typecheck
        run: npm --prefix website run typecheck
      - name: Build Docusaurus and validate images
        env:
          DOCS_ORG: ${{ github.repository_owner }}
          DOCS_REPO: ${{ github.event.repository.name }}
        run: npm --prefix website run build
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/build

  deploy:
    name: Documentation — deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
