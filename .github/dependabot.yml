version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      python-safe-updates:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    groups:
      frontend-safe-updates:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    groups:
      documentation-safe-updates:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-safe-updates:
        update-types: [minor, patch]
